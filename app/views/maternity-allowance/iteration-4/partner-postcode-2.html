
{% extends "layout.html" %}

{% block pageTitle %}
  DWP Relationships
{% endblock %}

{% block beforeContent %}
  <a class="govuk-back-link" href="javascript:window.history.back()">Back</a>
{% endblock %}

{% block content %}

  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">

      <form class="form" method="post">

        <div class="govuk-form-group">
          <fieldset class="govuk-fieldset" aria-describedby="contact-hint">
            <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
              <h1 class="govuk-fieldset__heading">
                Is your partner's address the same as yours?
              </h1>
            </legend>

            <div id="event-name-hint" class="govuk-hint">
              You told us your address is 123 Acacia Avenue, Chelsea, London, AB1 2CD.
            </div>
            <div class="govuk-radios govuk-radios--conditional" data-module="govuk-radios">
              <div class="govuk-radios__item">
                <input class="govuk-radios__input" id="postcode" name="postcode" type="radio" value="yes">
                <label class="govuk-label govuk-radios__label" for="postcode">
                  Yes
                </label>
              </div>
              <div class="govuk-radios__item">
                <input class="govuk-radios__input" id="postcode-2" name="postcode" type="radio" value="no">
                <label class="govuk-label govuk-radios__label" for="postcode-2">
                  No
                </label>
              </div>
              <div class="govuk-radios__item">
                <input class="govuk-radios__input" id="postcode-3" name="postcode" type="radio" value="unknown">
                <label class="govuk-label govuk-radios__label" for="postcode-3">
                  I don't know my partner's address
                </label>
              </div>
            </div>

          </fieldset>
        </div>

        <button class="govuk-button govuk-!-margin-bottom-2" data-module="govuk-button">Save and continue</button>
        <p><a href="cancel">Cancel</a><p>
      </form>

    </div>
  </div>










{% endblock %}
